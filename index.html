<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marco Cervera — Acceso</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #04040e;
      --card-bg:      rgba(255,255,255,0.035);
      --card-border:  rgba(255,255,255,0.07);
      --input-bg:     rgba(255,255,255,0.05);
      --input-border: rgba(255,255,255,0.09);
      --accent:       #6366f1;
      --accent2:      #8b5cf6;
      --accent3:      #06b6d4;
      --text:         #f1f5f9;
      --muted:        rgba(241,245,249,0.42);
      --mono:         'JetBrains Mono', monospace;
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity .35s ease;
    }
    body.fade-out { opacity: 0; }

    /* ── Dot grid ── */
    .dot-grid {
      position: fixed; inset: 0;
      background-image: radial-gradient(circle, rgba(99,102,241,0.12) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Scanlines ── */
    .scanlines {
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,0,0,0.04) 3px,
        rgba(0,0,0,0.04) 4px
      );
      pointer-events: none;
      z-index: 1;
    }

    /* ── Scanning beam ── */
    .beam {
      position: fixed;
      left: 0; right: 0;
      height: 140px;
      background: linear-gradient(180deg, transparent, rgba(99,102,241,0.025), transparent);
      pointer-events: none;
      z-index: 2;
      animation: beam 8s linear infinite;
    }
    @keyframes beam {
      0%   { top: -140px; }
      100% { top: 100vh; }
    }

    /* ── Background orbs ── */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      pointer-events: none;
      z-index: 0;
    }
    .orb-1 { width:520px; height:520px; background:#6366f1; opacity:.1; top:-180px; left:-180px; animation: o1 24s ease-in-out infinite; }
    .orb-2 { width:400px; height:400px; background:#8b5cf6; opacity:.08; bottom:-120px; right:-120px; animation: o2 30s ease-in-out infinite; }
    .orb-3 { width:260px; height:260px; background:#06b6d4; opacity:.06; top:55%; left:52%; animation: o3 18s ease-in-out infinite; }

    @keyframes o1 { 0%,100%{transform:translate(0,0)} 40%{transform:translate(90px,70px)} 70%{transform:translate(-50px,110px)} }
    @keyframes o2 { 0%,100%{transform:translate(0,0)} 35%{transform:translate(-70px,-80px)} 70%{transform:translate(50px,-40px)} }
    @keyframes o3 { 0%,100%{transform:translate(-50%,-50%) scale(1)} 50%{transform:translate(-50%,-50%) scale(1.7); opacity:.025} }

    /* ── Particle canvas ── */
    #canvas {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    /* ── Clock bar ── */
    .clock-bar {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      font-family: var(--mono);
      font-size: 0.7rem;
      color: rgba(99,102,241,0.7);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .clock-bar::before, .clock-bar::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(99,102,241,0.2));
    }
    .clock-bar::after {
      background: linear-gradient(90deg, rgba(99,102,241,0.2), transparent);
    }

    .clock-pulse {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #22d3ee;
      box-shadow: 0 0 8px #22d3ee;
      animation: pulse-dot 2s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes pulse-dot {
      0%,100%{ opacity:1; transform:scale(1); }
      50%{ opacity:.4; transform:scale(.7); }
    }

    /* ── Login wrap ── */
    .wrap {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 420px;
      padding: 0 20px;
    }

    /* ── Card ── */
    .card-outer {
      position: relative;
    }

    /* Corner brackets */
    .corner {
      position: absolute;
      width: 18px; height: 18px;
      border-color: rgba(99,102,241,0.5);
      border-style: solid;
      pointer-events: none;
      z-index: 2;
      transition: border-color .3s;
    }
    .corner-tl { top: -2px; left: -2px; border-width: 2px 0 0 2px; border-radius: 6px 0 0 0; }
    .corner-tr { top: -2px; right: -2px; border-width: 2px 2px 0 0; border-radius: 0 6px 0 0; }
    .corner-bl { bottom: -2px; left: -2px; border-width: 0 0 2px 2px; border-radius: 0 0 0 6px; }
    .corner-br { bottom: -2px; right: -2px; border-width: 0 2px 2px 0; border-radius: 0 0 6px 0; }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      border-radius: 22px;
      padding: 46px 40px 42px;
      box-shadow:
        0 30px 60px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(255,255,255,0.06),
        0 0 0 1px rgba(99,102,241,0.05);
      animation: card-glow 5s ease-in-out infinite;
    }

    @keyframes card-glow {
      0%,100%{ box-shadow: 0 30px 60px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.06), 0 0 30px rgba(99,102,241,0.06); }
      50%{     box-shadow: 0 30px 60px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.06), 0 0 55px rgba(99,102,241,0.15); }
    }

    /* ── Brand ── */
    .brand {
      text-align: center;
      margin-bottom: 38px;
    }

    .brand-icon {
      width: 58px; height: 58px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 16px;
      margin: 0 auto 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      box-shadow: 0 10px 30px rgba(99,102,241,0.38);
    }

    .brand h1 {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
      animation: glitch 9s infinite;
    }

    @keyframes glitch {
      0%,89%,100%{ transform:translateX(0); filter:none; }
      90%{ transform:translateX(-3px); filter:hue-rotate(30deg) brightness(1.1); }
      91%{ transform:translateX(3px); filter:hue-rotate(-30deg); }
      92%{ transform:translateX(-1px); filter:none; }
      93%{ transform:translateX(0); }
    }

    .brand-subtitle {
      font-size: 0.82rem;
      color: var(--muted);
      min-height: 1.2em;
    }

    .cursor {
      display: inline-block;
      width: 2px;
      height: 0.9em;
      background: var(--accent);
      margin-left: 2px;
      vertical-align: middle;
      animation: blink .85s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* ── Form ── */
    .field { margin-bottom: 18px; }

    .field label {
      display: block;
      font-family: var(--mono);
      font-size: 0.68rem;
      color: rgba(99,102,241,0.8);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .field label::before { content: '> '; opacity: .6; }

    .field input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 11px;
      padding: 12px 16px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.93rem;
      outline: none;
      transition: border-color .2s, box-shadow .2s, background .2s;
    }

    .field input::placeholder { color: rgba(255,255,255,0.16); }

    .field input:focus {
      border-color: var(--accent);
      background: rgba(99,102,241,0.07);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.16);
    }

    /* ── Button ── */
    .btn {
      width: 100%;
      margin-top: 6px;
      padding: 13px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      border: none;
      border-radius: 11px;
      font-family: 'Inter', sans-serif;
      font-size: 0.93rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 6px 22px rgba(99,102,241,0.38);
      transition: transform .15s, box-shadow .15s;
    }
    .btn:hover  { transform:translateY(-2px); box-shadow:0 10px 30px rgba(99,102,241,0.48); }
    .btn:active { transform:translateY(0); }
    .btn.busy   { opacity:.6; cursor:not-allowed; pointer-events:none; }

    /* ── Status badge ── */
    .sys-status {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      margin-top: 20px;
      font-family: var(--mono);
      font-size: 0.65rem;
      color: rgba(34,211,238,0.55);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .sys-status .dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #22d3ee;
      box-shadow: 0 0 6px #22d3ee;
      animation: pulse-dot 2.5s ease-in-out infinite;
    }

    /* ── Error ── */
    .error {
      display: none;
      margin-top: 14px;
      padding: 9px 14px;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.22);
      border-radius: 9px;
      color: #fca5a5;
      font-size: 0.78rem;
      text-align: center;
      font-family: var(--mono);
    }

    /* ── Shake ── */
    @keyframes shake {
      0%,100%{transform:translateX(0)}
      20%{transform:translateX(-9px)}
      40%{transform:translateX(9px)}
      60%{transform:translateX(-5px)}
      80%{transform:translateX(5px)}
    }
    .card.shake { animation: shake .42s ease-in-out, card-glow 5s ease-in-out infinite; }
  </style>
</head>
<body>

  <!-- Layers -->
  <div class="dot-grid"></div>
  <div class="scanlines"></div>
  <div class="beam"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <canvas id="canvas"></canvas>

  <!-- Clock -->
  <div class="clock-bar" style="width:100%;max-width:420px;padding:0 20px;z-index:10">
    <div class="clock-pulse"></div>
    <span id="clock">--:--:--</span>
    <div class="clock-pulse"></div>
  </div>

  <!-- Login -->
  <div class="wrap">
    <div class="card-outer">
      <div class="corner corner-tl"></div>
      <div class="corner corner-tr"></div>
      <div class="corner corner-bl"></div>
      <div class="corner corner-br"></div>

      <div class="card" id="card">
        <div class="brand">
          <div class="brand-icon">⚡</div>
          <h1>Marco Cervera</h1>
          <div class="brand-subtitle"><span id="typed-text"></span><span class="cursor"></span></div>
        </div>

        <form id="form">
          <div class="field">
            <label>Usuario</label>
            <input id="u" type="text" placeholder="identificador" autocomplete="username" spellcheck="false">
          </div>
          <div class="field">
            <label>Contraseña</label>
            <input id="p" type="password" placeholder="••••••••••" autocomplete="current-password">
          </div>
          <button type="submit" class="btn" id="btn">
            <span id="btn-label">Acceder</span>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </button>
          <div class="error" id="err">// ACCESO DENEGADO · Credenciales incorrectas</div>
        </form>

        <div class="sys-status">
          <span class="dot"></span>
          CONEXIÓN SEGURA · SHA-256 · TLS
          <span class="dot"></span>
        </div>
      </div>
    </div>
  </div>

  <script>
    /* ── Credentials (SHA-256 hashes) ─────────────────
       marko    → Slides2026
       invitado → Invitado2026
    ──────────────────────────────────────────────── */
    const CREDS = {
      marko:    'a000e55d8501a6b91a8ce0574bae2757347bf350e227d227fcfcf5c0523b9bc6',
      invitado: 'ff62ff6012b199e0c060bd2cf436655ddcc6b9782e8b7e509d560c0124efaba3',
    };

    if (sessionStorage.getItem('slides_user')) location.replace('dashboard.html');

    /* ── SHA-256 ── */
    async function sha256(str) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
    }

    /* ── Login form ── */
    const form  = document.getElementById('form');
    const card  = document.getElementById('card');
    const btn   = document.getElementById('btn');
    const label = document.getElementById('btn-label');
    const err   = document.getElementById('err');

    form.addEventListener('submit', async e => {
      e.preventDefault();
      const user = document.getElementById('u').value.trim().toLowerCase();
      const pass = document.getElementById('p').value;
      if (!user || !pass) return;

      btn.classList.add('busy');
      label.textContent = 'Verificando…';
      err.style.display = 'none';

      const hash = await sha256(pass);

      if (CREDS[user] && CREDS[user] === hash) {
        sessionStorage.setItem('slides_user', user);
        document.body.classList.add('fade-out');
        setTimeout(() => location.replace('dashboard.html'), 360);
      } else {
        btn.classList.remove('busy');
        label.textContent = 'Acceder';
        err.style.display = 'block';
        card.classList.remove('shake');
        void card.offsetWidth;
        card.classList.add('shake');
      }
    });

    /* ── Live clock ── */
    function tick() {
      const n = new Date();
      document.getElementById('clock').textContent =
        [n.getHours(), n.getMinutes(), n.getSeconds()]
          .map(v => String(v).padStart(2,'0')).join(':');
    }
    tick(); setInterval(tick, 1000);

    /* ── Typing animation ── */
    (function () {
      const texts  = ['Acceso a mis recursos', 'Bienvenido de vuelta', 'Sistema seguro activo'];
      const el     = document.getElementById('typed-text');
      let ti = 0, ci = 0, deleting = false;

      function type() {
        const t = texts[ti];
        el.textContent = deleting ? t.slice(0, ci--) : t.slice(0, ci++);

        if (!deleting && ci > t.length)       { deleting = true; return setTimeout(type, 1800); }
        if (deleting && ci < 0)               { deleting = false; ti = (ti + 1) % texts.length; ci = 0; }
        setTimeout(type, deleting ? 40 : 60);
      }
      setTimeout(type, 500);
    })();

    /* ── Particle constellation ── */
    (function () {
      const cv  = document.getElementById('canvas');
      const ctx = cv.getContext('2d');
      let W, H, dots;
      const N = 70, MAX_D = 125;

      function resize() { W = cv.width = innerWidth; H = cv.height = innerHeight; }

      function init() {
        dots = Array.from({length: N}, () => ({
          x: Math.random() * W, y: Math.random() * H,
          vx: (Math.random() - .5) * .42,
          vy: (Math.random() - .5) * .42,
          r:  Math.random() * 1.4 + .4,
        }));
      }

      function tick() {
        ctx.clearRect(0, 0, W, H);
        for (let i = 0; i < N; i++) {
          for (let j = i + 1; j < N; j++) {
            const d = Math.hypot(dots[i].x - dots[j].x, dots[i].y - dots[j].y);
            if (d < MAX_D) {
              ctx.beginPath();
              ctx.strokeStyle = `rgba(99,102,241,${.18 * (1 - d/MAX_D)})`;
              ctx.lineWidth = .55;
              ctx.moveTo(dots[i].x, dots[i].y);
              ctx.lineTo(dots[j].x, dots[j].y);
              ctx.stroke();
            }
          }
        }
        dots.forEach(d => {
          ctx.beginPath();
          ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(139,92,246,.48)';
          ctx.fill();
          d.x += d.vx; d.y += d.vy;
          if (d.x < 0 || d.x > W) d.vx *= -1;
          if (d.y < 0 || d.y > H) d.vy *= -1;
        });
        requestAnimationFrame(tick);
      }

      window.addEventListener('resize', () => { resize(); init(); });
      resize(); init(); tick();
    })();
  </script>
</body>
</html>
