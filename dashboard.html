<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marco Cervera — Recursos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #04040e;
      --nav-bg:      rgba(4,4,14,0.82);
      --card-bg:     rgba(255,255,255,0.035);
      --card-border: rgba(255,255,255,0.07);
      --accent:      #6366f1;
      --accent2:     #8b5cf6;
      --text:        #f1f5f9;
      --muted:       rgba(241,245,249,0.42);
      --muted2:      rgba(241,245,249,0.22);
      --mono:        'JetBrains Mono', monospace;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      opacity: 0;
      animation: fadeIn .4s ease .05s forwards;
    }

    @keyframes fadeIn { to { opacity: 1; } }

    /* ── Background ── */
    .dot-grid {
      position: fixed; inset: 0;
      background-image: radial-gradient(circle, rgba(99,102,241,0.09) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none; z-index: 0;
    }
    .scanlines {
      position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.035) 3px, rgba(0,0,0,0.035) 4px);
      pointer-events: none; z-index: 1;
    }
    .orb {
      position: fixed; border-radius: 50%;
      filter: blur(110px); pointer-events: none; z-index: 0;
    }
    .orb-1 { width:600px; height:600px; background:#6366f1; opacity:.07; top:-200px; left:-200px; animation: o1 26s ease-in-out infinite; }
    .orb-2 { width:420px; height:420px; background:#8b5cf6; opacity:.06; bottom:-130px; right:-130px; animation: o2 32s ease-in-out infinite; }

    @keyframes o1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(80px,80px)} }
    @keyframes o2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-60px,-60px)} }

    /* ── Navigation ── */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: var(--nav-bg);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid rgba(255,255,255,0.05);
      padding: 0 32px;
      height: 62px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .nav-logo .icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
      box-shadow: 0 4px 12px rgba(99,102,241,0.3);
    }

    .nav-logo-text {
      display: flex; flex-direction: column; gap: 1px;
    }

    .nav-logo-name {
      font-size: 0.88rem;
      font-weight: 700;
      letter-spacing: -0.015em;
      line-height: 1;
    }

    .nav-logo-sub {
      font-family: var(--mono);
      font-size: 0.58rem;
      color: rgba(99,102,241,0.7);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .nav-right {
      display: flex; align-items: center; gap: 14px;
    }

    .nav-badge {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 20px;
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--muted);
    }
    .nav-badge .dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: #22d3ee; box-shadow: 0 0 6px #22d3ee;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }

    .nav-guest-badge {
      padding: 4px 10px;
      background: rgba(245,158,11,0.12);
      border: 1px solid rgba(245,158,11,0.25);
      border-radius: 20px;
      font-family: var(--mono);
      font-size: 0.65rem;
      color: #fbbf24;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .btn-logout {
      padding: 6px 14px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 8px;
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      font-size: 0.78rem;
      cursor: pointer;
      transition: background .2s, color .2s, border-color .2s;
    }
    .btn-logout:hover {
      background: rgba(239,68,68,0.1);
      border-color: rgba(239,68,68,0.3);
      color: #fca5a5;
    }

    /* ── Main ── */
    main {
      position: relative; z-index: 2;
      max-width: 1200px;
      margin: 0 auto;
      padding: 48px 32px 80px;
    }

    /* ── Stats bar ── */
    .stats-bar {
      display: flex;
      gap: 20px;
      margin-bottom: 44px;
      flex-wrap: wrap;
    }

    .stat {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .stat-value {
      font-size: 1.9rem;
      font-weight: 700;
      letter-spacing: -0.04em;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }

    .stat-label {
      font-family: var(--mono);
      font-size: 0.62rem;
      color: var(--muted2);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .stat-divider {
      width: 1px;
      background: rgba(255,255,255,0.06);
      align-self: stretch;
      margin: 4px 0;
    }

    /* ── Page header ── */
    .page-header {
      margin-bottom: 10px;
    }

    .page-header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 6px;
    }

    .page-header h1 span {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .page-header p {
      color: var(--muted);
      font-size: 0.87rem;
    }

    /* ── Search + Filters ── */
    .toolbar {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 32px;
    }

    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 200px;
      max-width: 320px;
    }

    .search-wrap svg {
      position: absolute;
      left: 12px; top: 50%;
      transform: translateY(-50%);
      color: var(--muted2);
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 8px 14px 8px 36px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.82rem;
      outline: none;
      transition: border-color .2s, background .2s;
    }
    .search-input::placeholder { color: var(--muted2); }
    .search-input:focus {
      border-color: rgba(99,102,241,0.4);
      background: rgba(99,102,241,0.05);
    }

    .filters {
      display: flex; gap: 8px; flex-wrap: wrap;
    }

    .filter-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      font-size: 0.76rem;
      font-weight: 500;
      cursor: pointer;
      transition: all .2s;
    }
    .filter-btn:hover {
      background: rgba(99,102,241,0.1);
      border-color: rgba(99,102,241,0.3);
      color: var(--text);
    }
    .filter-btn.active {
      background: linear-gradient(135deg, rgba(99,102,241,0.22), rgba(139,92,246,0.22));
      border-color: rgba(99,102,241,0.45);
      color: #a5b4fc;
    }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 22px;
    }

    /* ── Card ── */
    .pcard {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 18px;
      overflow: hidden;
      cursor: pointer;
      transition: transform .25s ease, box-shadow .25s ease, border-color .25s;
      text-decoration: none;
      color: inherit;
      display: block;
      position: relative;
    }

    .pcard:hover {
      transform: translateY(-8px);
      box-shadow: 0 24px 50px rgba(0,0,0,0.5);
      border-color: rgba(99,102,241,0.28);
    }

    .pcard-thumb {
      position: relative;
      height: 175px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Subtle grid overlay on thumb */
    .pcard-thumb::before {
      content: '';
      position: absolute; inset: 0;
      background-image: linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 20px 20px;
      z-index: 1;
    }

    .pcard-thumb .emoji {
      font-size: 46px;
      position: relative; z-index: 2;
      filter: drop-shadow(0 4px 14px rgba(0,0,0,0.45));
      transition: transform .25s ease;
    }
    .pcard:hover .pcard-thumb .emoji { transform: scale(1.14); }

    .pcard-overlay {
      position: absolute; inset: 0; z-index: 3;
      background: rgba(0,0,0,0.4);
      display: flex; align-items: center; justify-content: center;
      opacity: 0;
      transition: opacity .25s;
    }
    .pcard:hover .pcard-overlay { opacity: 1; }

    .btn-open {
      padding: 9px 20px;
      background: rgba(255,255,255,0.9);
      color: #1e1b4b;
      border-radius: 9px;
      font-family: 'Inter', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      transform: translateY(8px);
      transition: transform .25s;
      border: none;
      pointer-events: none;
    }
    .pcard:hover .btn-open { transform: translateY(0); }

    .guest-lock {
      position: absolute; top: 10px; right: 10px; z-index: 4;
      width: 26px; height: 26px;
      background: rgba(245,158,11,0.15);
      border: 1px solid rgba(245,158,11,0.35);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px;
    }

    .pcard-body { padding: 18px 20px 20px; }

    .pcard-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 9px;
    }

    .pcard-tag {
      padding: 3px 9px;
      border-radius: 20px;
      font-size: 0.66rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }

    .pcard-date {
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--muted2);
    }

    .pcard-title {
      font-size: 0.96rem;
      font-weight: 600;
      letter-spacing: -0.015em;
      margin-bottom: 5px;
      line-height: 1.3;
    }

    .pcard-desc {
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ── Empty state ── */
    .empty {
      grid-column: 1/-1;
      text-align: center;
      padding: 80px 20px;
    }
    .empty .empty-icon { font-size: 56px; margin-bottom: 18px; opacity: .35; }
    .empty h3 { font-size: 1rem; font-weight: 600; color: var(--muted); margin-bottom: 5px; }
    .empty p  { font-size: 0.82rem; color: var(--muted2); }

    /* ── Guest notice ── */
    .guest-notice {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: rgba(245,158,11,0.08);
      border: 1px solid rgba(245,158,11,0.2);
      border-radius: 10px;
      margin-bottom: 28px;
      font-size: 0.8rem;
      color: #fbbf24;
    }
    .guest-notice.show { display: flex; }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      main { padding: 28px 16px 60px; }
      nav  { padding: 0 16px; }
      .page-header h1 { font-size: 1.5rem; }
      .grid { grid-template-columns: 1fr; }
      .stats-bar { gap: 14px; }
    }
  </style>
</head>
<body>

  <div class="dot-grid"></div>
  <div class="scanlines"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <!-- Navigation -->
  <nav>
    <div class="nav-logo">
      <div class="icon">⚡</div>
      <div class="nav-logo-text">
        <span class="nav-logo-name">Marco Cervera</span>
        <span class="nav-logo-sub">Recursos &amp; Presentaciones</span>
      </div>
    </div>
    <div class="nav-right">
      <div class="nav-badge">
        <span class="dot"></span>
        <span id="nav-user-label">cargando…</span>
      </div>
      <div class="nav-guest-badge" id="guest-badge" style="display:none">INVITADO</div>
      <button class="btn-logout" id="logout-btn">Salir</button>
    </div>
  </nav>

  <main>
    <!-- Stats -->
    <div class="stats-bar" id="stats-bar"></div>

    <!-- Header -->
    <div class="page-header">
      <h1>Mis <span id="section-title">recursos</span></h1>
      <p id="subtitle">Cargando…</p>
    </div>

    <!-- Guest notice -->
    <div class="guest-notice" id="guest-notice">
      <span>🔑</span>
      <span>Estás en modo invitado — solo puedes ver los recursos compartidos contigo.</span>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="search-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input class="search-input" id="search" type="text" placeholder="Buscar presentación…">
      </div>
      <div class="filters" id="filters"></div>
    </div>

    <!-- Grid -->
    <div class="grid" id="grid"></div>
  </main>

  <script>
    /* ── Auth guard ── */
    const user    = sessionStorage.getItem('slides_user');
    const isOwner = user === 'marko';
    if (!user) location.replace('index.html');

    document.getElementById('nav-user-label').textContent = user;
    if (!isOwner) {
      document.getElementById('guest-badge').style.display  = 'flex';
      document.getElementById('guest-notice').classList.add('show');
    }

    document.getElementById('logout-btn').addEventListener('click', () => {
      sessionStorage.removeItem('slides_user');
      location.replace('index.html');
    });

    /* ═══════════════════════════════════════════════════════════════
       RECURSOS — Agrega aquí cada nueva presentación o recurso.
       ─────────────────────────────────────────────────────────────
       guest: true  → visible también para usuarios invitados
       guest: false → solo visible para marko
    ═══════════════════════════════════════════════════════════════ */
    const ALL_SLIDES = [
      {
        title:    'Bienvenida al sistema',
        desc:     'Demo del sistema de slides con Reveal.js. Login, dashboard y presentaciones HTML.',
        date:     '2026-06-15',
        category: 'Demo',
        emoji:    '🚀',
        gradient: ['#6366f1', '#8b5cf6'],
        tag:      { bg: 'rgba(99,102,241,0.18)', color: '#a5b4fc' },
        url:      'presentaciones/demo/index.html',
        guest:    true,
      },
      {
        title:    'Transición Tecnológica 2026',
        desc:     'Migración a UADY Virtual 2026 y cuenta @correo.uady.mx. Countdown en vivo, timelines interactivos y plan de acompañamiento.',
        date:     '2026-06-15',
        category: 'FMED',
        emoji:    '🚀',
        gradient: ['#4f46e5', '#7c3aed'],
        tag:      { bg: 'rgba(79,70,229,0.18)', color: '#a5b4fc' },
        url:      'presentaciones/transicion-tecnologica-2026/index.html',
        guest:    false,
      },
      /* ── Agrega aquí más presentaciones ── */
    ];

    /* ── Filter by role ── */
    const SLIDES = isOwner ? ALL_SLIDES : ALL_SLIDES.filter(s => s.guest);

    /* ── Stats bar ── */
    const cats = [...new Set(SLIDES.map(s => s.category))];
    const statsBar = document.getElementById('stats-bar');
    const statsData = [
      { value: SLIDES.length, label: 'Presentaciones' },
      { value: cats.length,   label: 'Categorías' },
    ];
    statsData.forEach((s, i) => {
      if (i > 0) statsBar.innerHTML += '<div class="stat-divider"></div>';
      statsBar.innerHTML += `
        <div class="stat">
          <span class="stat-value">${s.value}</span>
          <span class="stat-label">${s.label}</span>
        </div>`;
    });

    /* ── Filters ── */
    const allCats = ['Todas', ...cats];
    let active = 'Todas';
    let query  = '';

    const filtersEl = document.getElementById('filters');
    allCats.forEach(c => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn' + (c === active ? ' active' : '');
      btn.textContent = c;
      btn.addEventListener('click', () => {
        active = c;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderGrid();
      });
      filtersEl.appendChild(btn);
    });

    document.getElementById('search').addEventListener('input', e => {
      query = e.target.value.toLowerCase();
      renderGrid();
    });

    /* ── Render grid ── */
    function renderGrid() {
      let list = active === 'Todas' ? SLIDES : SLIDES.filter(s => s.category === active);
      if (query) list = list.filter(s =>
        s.title.toLowerCase().includes(query) ||
        s.desc.toLowerCase().includes(query)
      );

      const total = list.length;
      document.getElementById('subtitle').textContent =
        total === 0 ? 'Sin resultados' :
        total === 1 ? '1 presentación disponible' : `${total} presentaciones disponibles`;

      if (!total) {
        document.getElementById('grid').innerHTML = `
          <div class="empty">
            <div class="empty-icon">📭</div>
            <h3>Sin resultados</h3>
            <p>Intenta con otra búsqueda o categoría.</p>
          </div>`;
        return;
      }

      document.getElementById('grid').innerHTML = list.map((s, i) => `
        <a class="pcard" href="${s.url}" style="animation: cardIn .35s ease ${i * 0.06}s both">
          <div class="pcard-thumb" style="background: linear-gradient(135deg, ${s.gradient[0]}, ${s.gradient[1]})">
            <span class="emoji">${s.emoji}</span>
            ${s.guest && isOwner ? '<div class="guest-lock" title="Visible para invitados">🔑</div>' : ''}
            <div class="pcard-overlay">
              <button class="btn-open">Abrir presentación →</button>
            </div>
          </div>
          <div class="pcard-body">
            <div class="pcard-meta">
              <span class="pcard-tag" style="background:${s.tag.bg};color:${s.tag.color}">${s.category}</span>
              <span class="pcard-date">${formatDate(s.date)}</span>
            </div>
            <div class="pcard-title">${s.title}</div>
            <div class="pcard-desc">${s.desc}</div>
          </div>
        </a>
      `).join('');
    }

    function formatDate(iso) {
      const [y, m, d] = iso.split('-');
      const months = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
      return `${parseInt(d)} ${months[parseInt(m)-1]} ${y}`;
    }

    const style = document.createElement('style');
    style.textContent = `@keyframes cardIn { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }`;
    document.head.appendChild(style);

    renderGrid();
  </script>
</body>
</html>
